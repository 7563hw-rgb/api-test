<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>TMap Real-time Navigation</title>
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script src="https://apis.openapi.sk.com/tmap/jsv2?version=1&appKey=tWt4JKsKeJ1y7rYBPARVR5pdzwX3eLq5a2mFMx1P"></script>
    
    <script type="text/javascript">
        // [중요] 변수를 함수 밖으로 꺼내서 어디서든 쓸 수 있게 합니다.
        var map = null;
        var marker_s = null; // 내 위치 마커
        var marker_e = null; // 도착지 마커
        var currentLat, currentLon;
        var drawInfoArr = [];
        var resultdrawArr = [];
        var isNavigating = false;

        function initTmap() {
            // 1. 지도 생성
            map = new Tmapv2.Map("map_div", {
                center : new Tmapv2.LatLng(37.562593, 126.992436),
                width : "100%",
                height : "400px",
                zoom : 17
            });

            // 2. GPS 감시 시작
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(successCallback, errorCallback, {
                    enableHighAccuracy: true,
                    timeout: 7000,
                    maximumAge: 0
                });
            } else {
                alert("GPS를 지원하지 않는 브라우저입니다.");
            }
        }

        function successCallback(position) {
            currentLat = position.coords.latitude;
            currentLon = position.coords.longitude;
            var myLatLng = new Tmapv2.LatLng(currentLat, currentLon);

            // [마커 로직] 기존 마커가 없으면 만들고, 있으면 위치만 옮깁니다.
            if (marker_s == null) {
                marker_s = new Tmapv2.Marker({
                    position: myLatLng,
                    map: map,
                    // 아이콘 경로 에러 방지를 위해 기본 마커 사용 (icon 줄 삭제)
                });
                console.log("내 위치 마커 최초 생성");
            } else {
                marker_s.setPosition(myLatLng);
                console.log("내 위치 마커 이동");
            }

            // [지도 중심 이동] 이 코드가 지도를 내 위치로 끌고 옵니다.
            map.setCenter(myLatLng);

            // 경로 이탈 체크
            if (isNavigating && drawInfoArr.length > 0) {
                if (isOutOfPath(currentLat, currentLon, drawInfoArr)) {
                    findRoute(destinationLon, destinationLat); 
                }
            }
        }

        function errorCallback(error) {
            console.log("GPS 수신 오류: " + error.message);
        }

        // 경로 이탈 판단 (약 30m)
        function isOutOfPath(lat, lon, pathArr) {
            var threshold = 0.0003; 
            var minDistance = Number.MAX_VALUE;
            for (var i = 0; i < pathArr.length; i++) {
                var dist = Math.sqrt(Math.pow(lat - pathArr[i]._lat, 2) + Math.pow(lon - pathArr[i]._lng, 2));
                if (dist < minDistance) minDistance = dist;
            }
            return minDistance > threshold;
        }

        // 주변 검색 함수
        function searchAround() {
            var keyword = $('#searchKeyword').val();
            var headers = { "appKey": "tWt4JKsKeJ1y7rYBPARVR5pdzwX3eLq5a2mFMx1P" };
            $.ajax({
                method:"GET",
                headers : headers,
                url:"https://apis.openapi.sk.com/tmap/pois/search/around?version=1&format=json",
                data:{
                    "categories" : keyword,
                    "resCoordType" : "EPSG3857",
                    "searchType" : "name",
                    "radius" : 1,
                    "reqCoordType" : "WGS84GEO",
                    "centerLon" : currentLon,
                    "centerLat" : currentLat,
                    "count" : 10
                },
                success:function(response){
                    var pois = response.searchPoiInfo.pois.poi;
                    var resHtml = "";
                    for(var i in pois){
                        var pLat = Number(pois[i].noorLat);
                        var pLon = Number(pois[i].noorLon);
                        var point = new Tmapv2.Point(pLon, pLat);
                        var conv = new Tmapv2.Projection.convertEPSG3857ToWGS84GEO(point);
                        resHtml += "<li>" + pois[i].name + " <button onclick='startNav("+conv._lng+","+conv._lat+")'>길찾기</button></li>";
                    }
                    $("#searchResult").html(resHtml);
                }
            });
        }

        function startNav(lon, lat) {
            destinationLon = lon; destinationLat = lat;
            isNavigating = true;
            findRoute(lon, lat);
        }

        function findRoute(endLon, endLat) {
            var headers = { "appKey": "tWt4JKsKeJ1y7rYBPARVR5pdzwX3eLq5a2mFMx1P" };
            if(marker_e) marker_e.setMap(null);
            marker_e = new Tmapv2.Marker({
                position : new Tmapv2.LatLng(endLat, endLon),
                map : map
            });

            $.ajax({
                method : "POST",
                headers : headers,
                url : "https://apis.openapi.sk.com/tmap/routes/pedestrian?version=1&format=json",
                data : {
                    "startX" : currentLon.toString(), "startY" : currentLat.toString(),
                    "endX" : endLon.toString(), "endY" : endLat.toString(),
                    "reqCoordType" : "WGS84GEO", "resCoordType" : "EPSG3857",
                    "startName" : "출발", "endName" : "도착"
                },
                success : function(response) {
                    var features = response.features;
                    if (resultdrawArr.length > 0) {
                        for (var i in resultdrawArr) { resultdrawArr[i].setMap(null); }
                        resultdrawArr = [];
                    }
                    drawInfoArr = [];
                    for (var i in features) {
                        var geom = features[i].geometry;
                        if (geom.type == "LineString") {
                            for (var j in geom.coordinates) {
                                var pt = new Tmapv2.Point(geom.coordinates[j][0], geom.coordinates[j][1]);
                                var cv = new Tmapv2.Projection.convertEPSG3857ToWGS84GEO(pt);
                                drawInfoArr.push(new Tmapv2.LatLng(cv._lat, cv._lng));
                            }
                        }
                    }
                    var polyline = new Tmapv2.Polyline({ path : drawInfoArr, strokeColor : "#FF0000", strokeWeight : 6, map : map });
                    resultdrawArr.push(polyline);
                }
            });
        }
    </script>
</head>
<body onload="initTmap();">
    
    <div style="padding:10px;">
        <input type="text" id="searchKeyword" value="편의점">
        <button onclick="searchAround()">주변검색</button>
    </div>

    <div style="padding: 10px; background: #fff;">
        <button onclick="initCompass()">🧭 나침반 켜기 (방향 권한 허용)</button>
        <span id="direction_info" style="margin-left: 10px; font-weight: bold; color: blue;">방향: 알 수 없음</span>
    </div>

    <div style="display:flex;">
        <ul id="searchResult" style="width:30%; height:400px; overflow:auto;"></ul>
        
        <div id="map_div" style="width: 70%; position: relative;">
            
            <img id="compass_arrow" 
                 src="https://cdn-icons-png.flaticon.com/512/318/318167.png" 
                 style="position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; margin-top: -20px; margin-left: -20px; z-index: 9999 !important; pointer-events: none; display: none; opacity: 0.8; transform: rotate(0deg);" />

        </div>
    </div>

</body>
</html>
